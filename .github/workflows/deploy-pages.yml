name: Deploy to GitHub Pages

# Compiles the solver to WebAssembly and publishes the web-live viewer to
# GitHub Pages. The whole engine runs client-side (WASM), so the deployed page
# is the same app as `./poker_solver --serve` locally - live training included.
# No server, and nothing large is committed to git history.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build solver to WebAssembly
        run: bash build-wasm.sh   # writes web-live/solver.js + web-live/solver.wasm

      - name: Assemble site
        run: |
          mkdir _site
          cp -r web-live/. _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
