<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIPoker_Solver Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>RIPoker_Solver Viewer</h1>
  <p class="subtitle">Trained strategy explorer &mdash; click an action to drill into that node.</p>

  <div id="loader">
    <div id="loader-status">Loading <code>solver_export.json</code>&hellip;</div>
    <div style="margin-top:8px;">
      <label>Or choose a file manually: <input type="file" id="fileInput" accept="application/json"></label>
    </div>
  </div>

  <div id="breadcrumb" class="breadcrumb" style="display:none;"></div>
  <div id="content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
