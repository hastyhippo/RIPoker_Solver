<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIPoker_Solver Live</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- Top banner: title on the left, config settings next to it, training on the right -->
  <header class="banner">
    <div class="brand">
      <h1>RIPoker_Solver</h1>
      <span class="brand-sub">Live</span>
    </div>

    <div class="banner-group config-group">
      <div class="group-label">Config</div>
      <div class="group-body">
        <label class="field">Effective stack
          <input type="number" id="stack" value="10" min="1">
        </label>
        <label class="field-checkbox">
          <input type="checkbox" id="useBetSizeBuckets">
          Bet-size buckets
        </label>
        <button class="primary" id="saveStacksBtn" title="Saving wipes all trained data">Save</button>
        <div class="status" id="stacksStatus"></div>
      </div>
    </div>

    <div class="banner-group training-group">
      <div class="group-label">Training</div>
      <div class="group-body">
        <label class="field">Iterations
          <input type="number" id="iterations" value="1000" min="1">
        </label>
        <button class="primary" id="trainBtn">Run</button>
        <button class="secondary" id="cancelTrainBtn" disabled>Cancel</button>
        <div class="progress-track" id="trainProgressTrack" style="display:none;">
          <div class="progress-fill" id="trainProgressFill"></div>
        </div>
        <div class="status" id="trainStatus"></div>
      </div>
    </div>
  </header>

  <!-- Position input bubble -->
  <section class="position-bubble">
    <div class="bubble-title">Position</div>
    <div class="bubble-body">
      <label class="field">History code
        <input type="text" id="history" class="wide" placeholder="e.g. 07AA,5">
      </label>
      <label class="field">Board 1 (flop)
        <input type="text" id="board0" placeholder="4" maxlength="1">
      </label>
      <label class="field">Board 2 (turn)
        <input type="text" id="board1" placeholder="6" maxlength="1">
      </label>
      <button class="secondary" id="lookupBtn">Look up</button>
      <button class="secondary" id="randomBtn">Random</button>
      <div class="status" id="positionStatus"></div>
    </div>
  </section>

  <!-- Strategy fills the middle-to-bottom of the screen -->
  <section class="strategy-panel" id="resultsPanel">
    <div class="panel-title">Strategy</div>
    <div id="results">Loading…</div>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
